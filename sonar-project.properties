# SonarQube / SonarCloud project configuration
sonar.projectKey=vibe-todo-v2
sonar.projectName=vibe-todo-v2
sonar.projectVersion=1.0

# Source settings
sonar.sources=app.vue,components,composables,pages,types,assets,nuxt.config.ts,tailwind.config.ts
sonar.sourceEncoding=UTF-8

# Language / TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# ESLint report (generated via `task lint` or `npm run lint:report`)
sonar.eslint.reportPaths=eslint-report.json

# Test coverage (generated via `task test:coverage` or `npm run test:coverage`)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
# sonar.tests=tests
# sonar.test.inclusions=tests/**/*.{test,spec}.ts



# Exclusions
sonar.exclusions=\
    node_modules/**,\
    .nuxt/**,\
    .output/**,\
    dist/**,\
    coverage/**,\
    public/**,\
    devops/**,\
    specs/**,\
    features/**,\
    eslint-report.json,\
    **/*.md

sonar.coverage.exclusions=\
    **/*.config.ts,\
    **/*.config.js,\
    nuxt.config.ts,\
    tailwind.config.ts
